<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Document AI Database</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="app">

            <div class="toolbar">

                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search title, category, doc number, or user..."
                />

                <select id="userFilter">
                    <option value="">All Users</option>
                    <option value="AI">AI</option>
                    <option value="INIS">INIS</option>
                    <option value="INBS">INBS</option>
                    <option value="HSIN">HSIN</option>
                    <option value="PKBM">PKBM</option>
                </select>

                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>

                <select id="sortDate">
                    <option value="newest">Newest Date</option>
                    <option value="oldest">Oldest Date</option>
                </select>

            </div>

            <div class="table-wrapper">

                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Category</th>
                            <th>Document</th>
                            <th>Document Title (Click Title to View Document)</th>
                            <th>Link</th>
                            <th>Status Period</th>
                            <th>User</th>
                        </tr>
                    </thead>

                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="loading">
                                Loading data...
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
